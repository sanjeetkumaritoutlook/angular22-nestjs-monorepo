
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f0f0f; }
.ht-root {
  background: #0f0f0f;
  min-height: 100vh;
  padding: 2rem 1rem;
  font-family: var(--font-sans, system-ui, sans-serif);
  color: #e8e6e1;
}
.ht-header { text-align: center; margin-bottom: 2.5rem; }
.ht-title { font-size: 22px; font-weight: 500; color: #e8e6e1; letter-spacing: -0.3px; }
.ht-date { font-size: 13px; color: #6b6b65; margin-top: 4px; }
.habit-list { display: flex; flex-direction: column; gap: 12px; max-width: 520px; margin: 0 auto; }
.habit-card {
  background: #1a1a1a;
  border: 0.5px solid #2a2a2a;
  border-radius: 14px;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  transition: border-color 0.2s;
  cursor: pointer;
  user-select: none;
}
.habit-card:hover { border-color: #3a3a3a; }
.habit-card.done { border-color: #1e3a2a; background: #141f19; }
.cb-wrap {
  position: relative;
  width: 28px; height: 28px;
  flex-shrink: 0;
}
.cb-bg {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 1.5px solid #3a3a3a;
  background: #111;
  transition: border-color 0.2s, background 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.habit-card.done .cb-bg {
  background: #22c55e;
  border-color: #22c55e;
}
.cb-check {
  opacity: 0;
  transform: scale(0.4);
  transition: opacity 0.15s, transform 0.15s;
}
.habit-card.done .cb-check { opacity: 1; transform: scale(1); }
.ripple {
  position: absolute;
  width: 28px; height: 28px;
  border-radius: 50%;
  background: #22c55e;
  opacity: 0;
  top: 0; left: 0;
  pointer-events: none;
}
.habit-info { flex: 1; }
.habit-name {
  font-size: 15px;
  font-weight: 500;
  color: #e8e6e1;
  transition: color 0.2s;
}
.habit-card.done .habit-name { color: #6b8f76; }
.streak-row { display: flex; align-items: center; gap: 6px; margin-top: 5px; }
.streak-pips { display: flex; gap: 3px; }
.pip {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #2a2a2a;
  transition: background 0.3s, transform 0.3s;
}
.pip.lit { background: #22c55e; }
.pip.lit.today { transform: scale(1.3); }
.streak-label { font-size: 11px; color: #4a4a44; }
.streak-label.active { color: #22c55e; }
.edit-btn {
  background: none; border: none; padding: 4px;
  color: #3a3a3a; cursor: pointer; border-radius: 6px;
  font-size: 16px; line-height: 1;
  transition: color 0.15s;
  flex-shrink: 0;
}
.edit-btn:hover { color: #6b6b65; }
.habit-card:hover .edit-btn { color: #4a4a44; }
.name-input {
  background: transparent;
  border: none;
  border-bottom: 1px solid #3a3a3a;
  color: #e8e6e1;
  font-size: 15px;
  font-weight: 500;
  width: 100%;
  outline: none;
  padding: 2px 0;
  font-family: inherit;
}
.footer {
  text-align: center;
  margin-top: 2rem;
  font-size: 12px;
  color: #333;
}
@keyframes pop { 0%{transform:scale(1)} 40%{transform:scale(1.3)} 70%{transform:scale(0.9)} 100%{transform:scale(1)} }
@keyframes rippleOut { 0%{opacity:0.35;transform:scale(0)} 100%{opacity:0;transform:scale(2.2)} }
.popping { animation: pop 0.35s cubic-bezier(0.36,0.07,0.19,0.97); }
.ripping { animation: rippleOut 0.4s ease-out forwards; }
</style>

<h2 class="sr-only">Daily habit tracker with 7-day streak counters</h2>
<div class="ht-root">
  <div class="ht-header">
    <div class="ht-title">Daily habits</div>
    <div class="ht-date" id="dateLabel"></div>
  </div>
  <div class="habit-list" id="habitList"></div>
  <div class="footer">Data saved locally in your browser</div>
</div>

<script>
const DEFAULT_HABITS = ["Morning workout","Read for 30 min","Drink 8 glasses of water","Meditate","No social media after 9pm"];
const STORE_KEY = "ht_v1";

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function daysBetween(a, b) {
  const msPerDay = 86400000;
  return Math.round((new Date(b) - new Date(a)) / msPerDay);
}

function load() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch { return {}; }
}
function save(data) {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(data)); } catch {}
}

function initData() {
  let data = load();
  if (!data.habits) {
    data.habits = DEFAULT_HABITS.map((name, i) => ({ id: i, name, history: [] }));
    save(data);
  }
  return data;
}

function calcStreak(history, today) {
  if (!history.length) return 0;
  const sorted = [...history].sort((a,b) => b > a ? 1 : -1);
  let streak = 0;
  let check = today;
  if (sorted[0] === today) {
    streak = 1;
    check = prevDay(today);
    let i = 1;
    while (i < sorted.length && sorted[i] === check) {
      streak++;
      check = prevDay(check);
      i++;
    }
  } else if (daysBetween(sorted[0], today) === 1) {
    check = sorted[0];
    streak = 0;
    let i = 0;
    while (i < sorted.length && sorted[i] === check) {
      streak++;
      check = prevDay(check);
      i++;
    }
  }
  return streak;
}

function prevDay(d) {
  const dt = new Date(d + "T12:00:00");
  dt.setDate(dt.getDate() - 1);
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}

function last7(history, today) {
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const dt = new Date(today + "T12:00:00");
    dt.setDate(dt.getDate() - i);
    const ds = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
    days.push({ date: ds, done: history.includes(ds), isToday: i === 0 });
  }
  return days;
}

let data = initData();
const today = todayStr();

document.getElementById("dateLabel").textContent = new Date().toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });

function render() {
  const list = document.getElementById("habitList");
  list.innerHTML = "";
  data.habits.forEach(habit => {
    const isDone = habit.history.includes(today);
    const streak = calcStreak(habit.history, today);
    const pips = last7(habit.history, today);

    const card = document.createElement("div");
    card.className = "habit-card" + (isDone ? " done" : "");
    card.dataset.id = habit.id;

    const cbWrap = document.createElement("div");
    cbWrap.className = "cb-wrap";

    const cbBg = document.createElement("div");
    cbBg.className = "cb-bg";
    cbBg.innerHTML = `<svg class="cb-check" width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M2.5 7L5.5 10L11.5 4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;

    const ripple = document.createElement("div");
    ripple.className = "ripple";
    cbWrap.appendChild(cbBg);
    cbWrap.appendChild(ripple);

    const info = document.createElement("div");
    info.className = "habit-info";

    const nameEl = document.createElement("div");
    nameEl.className = "habit-name";
    nameEl.textContent = habit.name;

    const streakRow = document.createElement("div");
    streakRow.className = "streak-row";

    const pipsEl = document.createElement("div");
    pipsEl.className = "streak-pips";
    pips.forEach(p => {
      const pip = document.createElement("div");
      pip.className = "pip" + (p.done ? " lit" : "") + (p.done && p.isToday ? " today" : "");
      pipsEl.appendChild(pip);
    });

    const streakLbl = document.createElement("div");
    streakLbl.className = "streak-label" + (streak > 0 ? " active" : "");
    streakLbl.textContent = streak === 1 ? "1 day streak" : streak > 1 ? `${streak} day streak` : "no streak";

    streakRow.appendChild(pipsEl);
    streakRow.appendChild(streakLbl);
    info.appendChild(nameEl);
    info.appendChild(streakRow);

    const editBtn = document.createElement("button");
    editBtn.className = "edit-btn";
    editBtn.innerHTML = '<i class="ti ti-pencil" aria-hidden="true"></i>';
    editBtn.title = "Rename habit";
    editBtn.setAttribute("aria-label", "Rename " + habit.name);

    editBtn.addEventListener("click", e => {
      e.stopPropagation();
      nameEl.innerHTML = "";
      const input = document.createElement("input");
      input.type = "text";
      input.className = "name-input";
      input.value = habit.name;
      nameEl.appendChild(input);
      input.focus();
      input.select();
      const done = () => {
        const val = input.value.trim();
        if (val) {
          data.habits.find(h => h.id === habit.id).name = val;
          save(data);
        }
        render();
      };
      input.addEventListener("blur", done);
      input.addEventListener("keydown", e => { if (e.key === "Enter") input.blur(); if (e.key === "Escape") { input.value = habit.name; input.blur(); } });
    });

    card.appendChild(cbWrap);
    card.appendChild(info);
    card.appendChild(editBtn);

    card.addEventListener("click", e => {
      if (e.target.closest(".edit-btn")) return;
      const h = data.habits.find(h => h.id === habit.id);
      const idx = h.history.indexOf(today);
      if (idx === -1) {
        h.history.push(today);
        cbBg.classList.add("popping");
        ripple.classList.add("ripping");
        setTimeout(() => { cbBg.classList.remove("popping"); ripple.classList.remove("ripping"); }, 400);
      } else {
        h.history.splice(idx, 1);
      }
      save(data);
      setTimeout(render, 150);
    });

    list.appendChild(card);
  });
}

render();
</script>
